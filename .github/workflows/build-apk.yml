# Gera APK (debug) na nuvem — não precisas de Android Studio no PC.
# Requer secrets: VITE_SUPABASE_URL e VITE_SUPABASE_ANON_KEY (iguais ao .env local).

name: Build Android APK

on:
  # Corre manualmente: Actions → Build Android APK → Run workflow
  workflow_dispatch:

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web + Capacitor sync
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build:capacitor

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'

      - name: Gradle assembleDebug
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: amigos-coimbra-debug
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
