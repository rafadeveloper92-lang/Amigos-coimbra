# Gera APK (debug) na nuvem.
# Requer secrets: VITE_SUPABASE_URL e VITE_SUPABASE_ANON_KEY.
#
# Nota: instalamos o SDK com curl+sdkmanager em vez da action que às vezes falha no runner.

name: Build Android APK

on:
  workflow_dispatch:

jobs:
  apk:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web + Capacitor sync
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build:capacitor

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK (cmdline-tools)
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq unzip curl
          ANDROID_SDK="$HOME/android-sdk"
          mkdir -p "$ANDROID_SDK/cmdline-tools"
          # Pacote oficial (Linux). Se 404 no futuro, atualiza o nome do zip em:
          # https://developer.android.com/studio#command-line-tools-only
          curl -fsSL "https://dl.google.com/android/repository/commandlinetools-linux-13114758_latest.zip" -o /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d /tmp
          rm -rf "$ANDROID_SDK/cmdline-tools/latest"
          mv /tmp/cmdline-tools "$ANDROID_SDK/cmdline-tools/latest"
          export PATH="$ANDROID_SDK/cmdline-tools/latest/bin:$PATH"
          export ANDROID_HOME="$ANDROID_SDK"
          export ANDROID_SDK_ROOT="$ANDROID_SDK"
          yes | sdkmanager --sdk_root="$ANDROID_SDK" --licenses >/dev/null || true
          sdkmanager --sdk_root="$ANDROID_SDK" --install "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_HOME=$ANDROID_SDK" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK" >> "$GITHUB_ENV"
          echo "PATH=$ANDROID_SDK/cmdline-tools/latest/bin:$ANDROID_SDK/platform-tools:$PATH" >> "$GITHUB_ENV"

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Gradle assembleDebug
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: amigos-coimbra-debug
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
